name: trivy

on:
  push:
    branches: [ "main", "development", "nam20485" ]
  pull_request:
    branches: [ "main", "development", "nam20485" ]

permissions:
  contents: read

jobs:
  scan:
    name: Scan ${{ matrix.name }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-orchestration-loop
            dockerfile: ./Dockerfile
            context: .
          - name: agent-orchestration-loop-webhook
            dockerfile: ./Dockerfile.webhook
            context: .
          - name: agent-orchestration-loop-caddy
            dockerfile: ./deploy/caddy/Dockerfile
            context: ./deploy/caddy

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: |
          docker build -t ${{ matrix.name }}:${{ github.sha }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe # v0.28.0
        with:
          image-ref: '${{ matrix.name }}:${{ github.sha }}'
          format: 'template'
          template: '@/contrib/sarif.tpl'
          output: 'trivy-results-${{ matrix.name }}.sarif'
          severity: 'CRITICAL,HIGH'

      # - name: Upload Trivy scan results to GitHub Security tab
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: 'trivy-results-${{ matrix.name }}.sarif'
      #     category: ${{ matrix.name }}
