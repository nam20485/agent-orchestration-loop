services:
  orchestratorservice:
    image: ghcr.io/nam20485/orchestrator-service:main-latest
    pull_policy: always
    platform: linux/amd64
    ports:
      - "4099:4099"
    volumes:
      - opencode-memory:/app/.memory
      - ${WORKSPACE_DIR:?WORKSPACE_DIR is required}:/workspace
    restart: always
    environment:
      - ZAI_CODING_API_KEY=${ZAI_CODING_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL_STUDIO_API_KEY=${MODEL_STUDIO_API_KEY}
      - MS_DS_API_KEY=${MS_DS_API_KEY}
      - NOTION_MCP_CONNECTIONS_API_KEY=${NOTION_MCP_CONNECTIONS_API_KEY}
      - GH_ORCHESTRATION_AGENT_TOKEN=${GH_ORCHESTRATION_AGENT_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?OPENCODE_SERVER_PASSWORD is required} # REDACTED

  webhook-receiver:
    image: ghcr.io/nam20485/orchestrator-service/webhook:main-latest
    pull_policy: always
    platform: linux/amd64
    expose:
      - "8080"
    volumes:
      - ${WORKSPACE_DIR:?WORKSPACE_DIR is required}:/workspace
    environment:
      - OS_WEBHOOK_SECRET=${OS_WEBHOOK_SECRET}
      - OPENCODE_SERVER_URL=http://orchestratorservice:4099
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:?OPENCODE_SERVER_PASSWORD is required} # REDACTED
      - GH_ORCHESTRATION_AGENT_TOKEN=${GH_ORCHESTRATION_AGENT_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - WEBHOOK_ALLOWED_EVENTS=${WEBHOOK_ALLOWED_EVENTS:-}
      - WEBHOOK_ENABLE_SIMULATOR=${WEBHOOK_ENABLE_SIMULATOR:-0}
      - BEADS_ENABLED=${BEADS_ENABLED:-true}
      - BEADS_POLL_INTERVAL=${BEADS_POLL_INTERVAL:-10}
      - BEADS_MAX_RETRIES=${BEADS_MAX_RETRIES:-3}
      - BEADS_WORKSPACE_ROOT=${BEADS_WORKSPACE_ROOT:-/workspace}
      - BEADS_TARGET_REPO=${BEADS_TARGET_REPO:-}
    depends_on:
      - orchestratorservice
    restart: unless-stopped

  webhook-proxy:
    image: ghcr.io/nam20485/orchestrator-service/caddy:main-latest
    pull_policy: always
    # Host :80 â€” HTTP (local dev, Tailscale Funnel, ACME). For Caddy TLS on :443 in prod,
    # also use compose.https.yaml (see README) or COMPOSE_FILE=compose.yaml:compose.https.yaml
    ports:
      - "80:80"
    environment:
      # :80 = HTTP only; set to your hostname (e.g. hooks.example.com) for automatic HTTPS
      - WEBHOOK_SITE_ADDRESS=${WEBHOOK_SITE_ADDRESS:-:80}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - webhook-receiver
    restart: unless-stopped

volumes:
  opencode-memory:
  caddy_data:
  caddy_config:
